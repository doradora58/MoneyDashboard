apiVersion: apps/v1
kind: Deployment
metadata:
  name: money-dashboard
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: money-dashboard
  template:
    metadata:
      labels:
        app: money-dashboard
    spec:
      containers:
      - name: money-dashboard
        image: ghcr.io/doradora58/money-dashboard:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: money-dashboard-service
  namespace: default
spec:
  selector:
    app: money-dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000