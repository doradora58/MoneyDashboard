apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "umami" 
        - name: POSTGRES_USER
          value: "doradora"
        - name: POSTGRES_PASSWORD
          value: "password"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  # ServiceのタイプをNodePortに変更
  type: NodePort
  selector:
    app: postgres
  ports:
    - protocol: TCP
      # Serviceがクラスター内部で公開するポート
      port: 5432
      # Pod（コンテナ）がリッスンしているポート
      targetPort: 5432
      # クラスター外部に公開するポート
      # このポート番号（30000-32767の範囲）で外部からアクセスする
      nodePort: 30432
