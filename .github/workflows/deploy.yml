name: K3s Build and Deploy
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: self-hosted 
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/frontend/money_dashboard/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/money-dashboard:latest

  deploy:
    needs: build-and-push # ビルドが終わってから実行
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Test DB Connection from Runner
        run: |
          DB_HOST=$(echo "${{ secrets.DATABASE_URL }}" | awk -F'[@:/]' '{print $(NF-2)}')
          DB_PORT=$(echo "${{ secrets.DATABASE_URL }}" | awk -F'[:/]' '{print $(NF-1)}')
          echo "Testing connection to $DB_HOST on port $DB_PORT"
          if ! nc -zv $DB_HOST $DB_PORT; then
            echo "Warning: Could not connect to database. Checking if it's a network issue..."
            ping -c 1 $DB_HOST || echo "Host unreachable"
          fi
        continue-on-error: true
      - name: Deploy PostgreSQL (if not exists)
        env:
          KUBECONFIG: /home/doradora1/.kube/config
        run: |
          if ! kubectl get svc postgres &> /dev/null; then
            echo "PostgreSQL をデプロイ中..."
            kubectl delete pvc postgres-pvc --ignore-not-found=true
            kubectl apply -f infrastructure/k8s/postgres.yaml
            kubectl wait --for=condition=ready pod -l app=postgres --timeout=300s
          else
            echo "PostgreSQL は既に起動しています"
          fi

      - name: Prisma Migrate Deploy
        env:
          KUBECONFIG: /home/doradora1/.kube/config
          DATABASE_URL: postgresql://postgres:your-secure-password-here@postgres.default.svc.cluster.local:5432/money_db
        run: |
          kubectl run prisma-migrate-$(date +%s) \
            --image=ghcr.io/${{ github.repository_owner }}/money-dashboard:latest \
            --restart=Never \
            --rm \
            -i \
            --overrides='{"spec":{"containers":[{"name":"prisma-migrate","image":"ghcr.io/${{ github.repository_owner }}/money-dashboard:latest","volumeMounts":[{"name":"prisma-vol","mountPath":"/app/prisma"}]}],"volumes":[{"name":"prisma-vol","hostPath":{"path":"/home/doradora1/_work/MoneyDashboard/MoneyDashboard/prisma"}}]}}' \
            -- npx prisma migrate deploy
      # アプリのデプロイなど（既存のステップ）
      - name: Deploy App
        run: ./deploy-script.sh

      - name: Deploy to K3s
        env:
          KUBECONFIG: /home/doradora1/.kube/config
        run: |
          kubectl get nodes
          kubectl apply -R -f infrastructure/k8s/
          kubectl rollout restart deployment/money-dashboard -n default || true
