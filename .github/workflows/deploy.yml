name: K3s Build and Deploy
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend/money_dashboard
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/money-dashboard:latest
  deploy:
    needs: build-and-push # ビルドが終わってから実行
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to K3s
        env:
          KUBECONFIG: /home/doradora1/.kube/config
        run: |
          kubectl get nodes
          kubectl apply -R -f infrastructure/k8s/
          kubectl rollout restart deployment/money-dashboard -n default || true