name: K3s Build and Deploy
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: self-hosted 
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend/money_dashboard
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/money-dashboard:latest

  deploy:
    needs: build-and-push # ビルドが終わってから実行
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Prisma Migrate Deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }} # 直接この名前で定義
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/apps/frontend/money_dashboard/prisma:/app/prisma \
            -w /app \
            -e DATABASE_URL \
            ghcr.io/${{ github.repository_owner }}/money-dashboard:latest \
            npx prisma@6 migrate deploy

      # アプリのデプロイなど（既存のステップ）
      - name: Deploy App
        run: ./deploy-script.sh

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to K3s
        env:
          KUBECONFIG: /home/doradora1/.kube/config
        run: |
          kubectl get nodes
          kubectl apply -R -f infrastructure/k8s/
          kubectl rollout restart deployment/money-dashboard -n default || true